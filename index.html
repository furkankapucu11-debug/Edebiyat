<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Edebiyat Kartları</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: none;
        }

        .header {
            padding: 20px;
            text-align: center;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .card-container {
            position: relative;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
            padding: 20px;
        }

        .card {
            position: absolute;
            width: 90%;
            max-width: 350px;
            height: 450px;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.3s ease-out, opacity 0.3s;
            cursor: grab;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .card h2 { font-size: 1.5rem; margin-bottom: 15px; color: var(--primary); }
        .card p { font-size: 1.1rem; line-height: 1.6; opacity: 0.9; }

        .hint {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            font-size: 0.9rem;
            opacity: 0.5;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.7; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>YKS Edebiyat Kartları</h1>
</div>

<div class="card-container" id="container">
    <div class="hint">← Geri | İleri →</div>
</div>

<script>
    const data = [
        { title: "İntibah", desc: "Namık Kemal tarafından yazılan ilk edebi romandır." },
        { title: "Şair Evlenmesi", desc: "Şinasi'nin kaleme aldığı Batılı anlamda ilk tiyatro eseridir." },
        { title: "Mai ve Siyah", desc: "Halit Ziya Uşaklıgil'in Realizm akımının en güçlü örneklerinden biri olan eseridir." },
        { title: "Araba Sevdası", desc: "Recaizade Mahmut Ekrem tarafından yazılan ilk realist romandır." }
    ];

    const container = document.getElementById('container');
    let currentIndex = 0;

    function createCard(index) {
        if (index >= data.length || index < 0) return null;
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `<h2>${data[index].title}</h2><p>${data[index].desc}</p>`;
        return card;
    }

    function render() {
        container.innerHTML = '<div class="hint">← Geri | İleri →</div>';
        const card = createCard(currentIndex);
        if (card) {
            container.appendChild(card);
            const hammertime = new Hammer(card);
            
            hammertime.on('swipeleft', () => {
                if (currentIndex < data.length - 1) {
                    card.style.transform = 'translateX(-150%) rotate(-30deg)';
                    card.style.opacity = '0';
                    setTimeout(() => { currentIndex++; render(); }, 300);
                }
            });

            hammertime.on('swiperight', () => {
                if (currentIndex > 0) {
                    card.style.transform = 'translateX(150%) rotate(30deg)';
                    card.style.opacity = '0';
                    setTimeout(() => { currentIndex--; render(); }, 300);
                }
            });
        }
    }

    render();
</script>

</body>
</html>
